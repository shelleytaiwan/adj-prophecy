<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>擲筊占卜感受</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --wood:#2b160f;
  --wood-2:#1b0d08;
  --temple-red:#6e1423;
  --vermilion:#b81d24;
  --gold:#d4af37;
  --gold-soft:#e8cf8a;
  --parchment:#f5e6c8;
  --ink:#241209;
  --shadow:rgba(0,0,0,.5);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  min-height:100vh;
  background:
    radial-gradient(ellipse at 50% -10%, #3a1712 0%, transparent 60%),
    radial-gradient(ellipse at 10% 100%, #1a0a06 0%, transparent 50%),
    linear-gradient(180deg, var(--wood-2) 0%, var(--wood) 45%, #170b06 100%);
  font-family:"Noto Sans TC", sans-serif;
  color:var(--parchment);
  padding:28px 14px 60px;
  position:relative;
  overflow-x:hidden;
}
/* incense smoke */
.smoke{
  position:absolute; top:0; left:50%; width:2px; height:140px;
  background:linear-gradient(180deg, rgba(232,207,138,0) 0%, rgba(232,207,138,.35) 40%, rgba(232,207,138,0) 100%);
  filter:blur(6px);
  transform:translateX(-50%);
  animation:drift 6s ease-in-out infinite;
  pointer-events:none;
}
@keyframes drift{
  0%{opacity:.15; transform:translateX(-50%) translateY(0) scaleX(1);}
  50%{opacity:.5; transform:translateX(-38%) translateY(-60px) scaleX(2.4);}
  100%{opacity:0; transform:translateX(-20%) translateY(-140px) scaleX(4);}
}
.wrap{max-width:640px; margin:0 auto; position:relative; z-index:1;}

/* header */
header{text-align:center; margin-bottom:30px;}
.lantern-row{font-size:26px; letter-spacing:22px; opacity:.85; margin-bottom:4px;}
h1{
  font-family:"Noto Serif TC", serif;
  font-weight:900;
  font-size:clamp(28px,7vw,42px);
  margin:6px 0 4px;
  color:var(--gold-soft);
  text-shadow:0 2px 0 #000, 0 0 22px rgba(212,175,55,.35);
  letter-spacing:.06em;
}
.sub{
  font-size:13px; letter-spacing:.32em; color:var(--gold);
  text-transform:uppercase; opacity:.75;
}
.divider{
  width:120px; height:2px; margin:16px auto 0;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* step cards */
.step{
  background:linear-gradient(180deg, #3a1e14 0%, #241109 100%);
  border:1px solid rgba(212,175,55,.35);
  border-radius:4px;
  padding:20px 20px 22px;
  margin-bottom:18px;
  position:relative;
  box-shadow:0 10px 26px var(--shadow), inset 0 0 0 1px rgba(0,0,0,.3);
  transition:opacity .35s ease, filter .35s ease;
}
.step::before, .step::after{
  content:""; position:absolute; width:9px; height:9px; border:1px solid var(--gold); opacity:.6;
}
.step::before{top:6px; left:6px; border-right:none; border-bottom:none;}
.step::after{bottom:6px; right:6px; border-left:none; border-top:none;}
.step.locked{opacity:.42; filter:grayscale(.5); pointer-events:none;}
.step-head{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
.step-num{
  font-family:"Noto Serif TC", serif; font-weight:900; font-size:15px;
  width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle at 35% 30%, #e8cf8a, #b8902f 70%, #7a5f1c);
  color:#2b1608;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
  flex-shrink:0;
}
.step-title{font-family:"Noto Serif TC", serif; font-weight:700; font-size:24px; color:var(--gold-soft);}
.step-desc{font-size:15px; color:#d8c5a4; opacity:.8; margin-top:2px;}

.btn{
  font-family:"Noto Serif TC", serif;
  font-weight:700;
  font-size:19px;
  border:1px solid var(--gold);
  background:linear-gradient(180deg, var(--vermilion), #7a1018);
  color:var(--gold-soft);
  padding:12px 22px;
  border-radius:3px;
  cursor:pointer;
  letter-spacing:.08em;
  box-shadow:0 4px 0 #4a0c10, 0 8px 14px rgba(0,0,0,.4);
  transition:transform .12s ease, box-shadow .12s ease;
}
.btn:active{transform:translateY(3px); box-shadow:0 1px 0 #4a0c10, 0 4px 8px rgba(0,0,0,.4);}
.btn:disabled{opacity:.4; cursor:not-allowed;}
.btn.ghost{
  background:transparent; color:var(--gold-soft); box-shadow:none; border:1px solid rgba(212,175,55,.5);
}

.chip-grid{display:flex; flex-wrap:wrap; gap:10px; margin-top:16px;}
.chip{
  border:1px solid rgba(212,175,55,.55);
  background:rgba(212,175,55,.06);
  color:var(--parchment);
  padding:10px 18px;
  border-radius:22px;
  font-size:17px;
  cursor:pointer;
  transition:background .15s, transform .1s;
}
.chip:hover{background:rgba(212,175,55,.22);}
.chip:active{transform:scale(.96);}

.picked{
  display:inline-flex; align-items:center; gap:8px;
  margin-top:14px; padding:10px 20px;
  background:rgba(212,175,55,.12);
  border:1px solid var(--gold);
  border-radius:22px;
  font-family:"Noto Serif TC", serif; font-weight:700; font-size:20px;
  color:var(--gold-soft);
}
.picked .tag{font-size:12px; letter-spacing:.15em; color:#d8c5a4; opacity:.7; font-family:"Noto Sans TC",sans-serif; font-weight:400;}

/* jiaobei toss zone */
.toss-zone{display:flex; flex-direction:column; align-items:center; gap:18px; margin-top:8px;}
.coins{display:flex; gap:14px; height:130px; align-items:center; justify-content:center;}
.coin{width:78px; height:100px; position:relative; transform-origin:center;}
.coin.a{transform:rotate(-12deg);}
.coin.b{transform:rotate(184deg);}
.coin svg{width:100%; height:100%; display:block; filter:drop-shadow(0 5px 8px rgba(0,0,0,.55));}
.coin.tossing{animation:toss 1.1s cubic-bezier(.34,1.4,.4,1) 1;}
.coin.tossing.b{animation-delay:.06s;}
@keyframes toss{
  0%{transform:translateY(0) rotate(0deg);}
  30%{transform:translateY(-90px) rotate(340deg);}
  55%{transform:translateY(-50px) rotate(620deg);}
  100%{transform:translateY(0) rotate(1080deg);}
}

.sentence-box{
  margin-top:18px; padding:20px; border-radius:4px;
  background:linear-gradient(180deg, rgba(212,175,55,.08), rgba(212,175,55,.02));
  border:1px dashed rgba(212,175,55,.5);
  text-align:center;
  min-height:40px;
}
.sentence{
  font-family:"Noto Serif TC", serif; font-weight:700;
  font-size:clamp(26px,7.2vw,40px);
  color:var(--parchment);
  line-height:1.6;
}
.sentence .hl{color:var(--gold-soft);}
.annot{font-size:15px; color:#c9b489; margin-top:10px; font-style:italic; opacity:.9;}

.result-row{display:flex; align-items:center; justify-content:center; gap:18px; margin-top:18px; flex-wrap:wrap;}
.stamp{
  font-family:"Noto Serif TC", serif; font-weight:900; font-size:30px;
  width:104px; height:104px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  border:4px solid currentColor; transform:rotate(-6deg);
  letter-spacing:.1em;
  writing-mode:vertical-rl;
  box-shadow:0 0 0 2px rgba(0,0,0,.25) inset;
  flex-shrink:0;
}
.stamp.sheng{color:#ffd75e; text-shadow:0 0 10px rgba(255,215,94,.5);}
.stamp.xiao{color:#ff9a52; text-shadow:0 0 10px rgba(255,154,82,.5);}
.stamp.yin{color:#8fa3c9; text-shadow:0 0 10px rgba(143,163,201,.4);}
.result-comment{max-width:340px; font-size:17px; color:#e6d5ac; text-align:left; line-height:1.6;}
.result-comment b{color:var(--gold-soft); font-family:"Noto Serif TC",serif; font-size:19px;}

.progress{display:flex; align-items:center; justify-content:center; gap:7px; margin-top:18px; font-size:14px; color:#c9b489;}
.dot{width:11px; height:11px; border-radius:50%; background:rgba(212,175,55,.25); border:1px solid rgba(212,175,55,.5);}
.dot.done{background:var(--gold);}
.dot.sheng-mark{background:#ffd75e; box-shadow:0 0 6px #ffd75e;}

.controls-row{display:flex; justify-content:center; gap:10px; margin-top:18px; flex-wrap:wrap;}

.history{margin-top:6px;}
.history h3{font-family:"Noto Serif TC",serif; font-size:17px; color:var(--gold); text-align:center; margin:0 0 12px; letter-spacing:.1em;}
.history-item{
  display:flex; justify-content:space-between; gap:10px; align-items:center;
  padding:11px 12px; border-bottom:1px solid rgba(212,175,55,.15);
  font-size:16px; color:#dcc9a4;
}
.history-item .hs{font-family:"Noto Serif TC",serif;}
.history-item .hr{font-size:13px; padding:3px 10px; border-radius:10px; border:1px solid currentColor; flex-shrink:0;}
.hr.sheng{color:#ffd75e;} .hr.xiao{color:#ff9a52;} .hr.yin{color:#8fa3c9;}

footer{text-align:center; margin-top:34px; font-size:11px; letter-spacing:.15em; color:rgba(232,207,138,.4);}

@media (prefers-reduced-motion: reduce){
  .smoke, .coin.tossing{animation:none;}
}
</style>
</head>

/* ---------------- 狀態 ---------------- */
let state = {
  category:null, subject:null, adverbToken:null,
  usedInCat:{}, usedAdj:[],
  block:0, blockSheng:0,
  history:[]
};
Object.keys(categories).forEach(c=>state.usedInCat[c]=[]);

function drawFromPool(pool, usedArr){
  let avail = pool.filter(x=>!usedArr.includes(x));
  if(avail.length===0){ usedArr.length=0; avail = pool.slice(); }
  const pick = avail[Math.floor(Math.random()*avail.length)];
  usedArr.push(pick);
  return pick;
}

/* ---------------- STEP 1: 問事 ---------------- */
const btnAsk = document.getElementById('btnAsk');
const catGrid = document.getElementById('catGrid');
const pickedSubject = document.getElementById('pickedSubject');
const step2 = document.getElementById('step2');

Object.keys(categories).forEach(cat=>{
  const chip = document.createElement('div');
  chip.className='chip'; chip.textContent=cat;
  chip.onclick=()=>chooseCategory(cat);
  catGrid.appendChild(chip);
});

btnAsk.onclick=()=>{ catGrid.style.display = catGrid.style.display==='none' ? 'flex':'none'; };

function chooseCategory(cat){
  state.category = cat;
  state.subject = drawFromPool(categories[cat], state.usedInCat[cat]);
  catGrid.style.display='none';
  pickedSubject.innerHTML = `<div class="picked">🎋 ${state.subject}<span class="tag">來自「${cat}」</span></div>`;
  step2.classList.remove('locked');
  resetStep3UIForNewSubject();
}

/* ---------------- STEP 2: 程度 ---------------- */
const btnLevel = document.getElementById('btnLevel');
const levelGrid = document.getElementById('levelGrid');
const pickedLevel = document.getElementById('pickedLevel');
const step3 = document.getElementById('step3');

adverbs.forEach(av=>{
  const chip = document.createElement('div');
  chip.className='chip'; chip.textContent=av.t;
  chip.onclick=()=>chooseAdverb(av);
  levelGrid.appendChild(chip);
});
btnLevel.onclick=()=>{ levelGrid.style.display = levelGrid.style.display==='none' ? 'flex':'none'; };

function chooseAdverb(av){
  state.adverbToken = av;
  levelGrid.style.display='none';
  pickedLevel.innerHTML = `<div class="picked">📿 ${av.t}</div>`;
  step3.classList.remove('locked');
}

/* ---------------- STEP 3: 擲筊 ---------------- */
const btnToss = document.getElementById('btnToss');
const coinA = document.getElementById('coinA');
const coinB = document.getElementById('coinB');
const sentenceBox = document.getElementById('sentenceBox');
const sentenceText = document.getElementById('sentenceText');
const annotText = document.getElementById('annotText');
const resultRow = document.getElementById('resultRow');
const progress = document.getElementById('progress');
const controlsRow = document.getElementById('controlsRow');
const btnAgain = document.getElementById('btnAgain');
const btnSpeak = document.getElementById('btnSpeak');
const historyBox = document.getElementById('historyBox');
const historyList = document.getElementById('historyList');

const coinSVG = `<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg">

<defs><radialGradient id="g" cx="38%" cy="28%" r="80%"><stop offset="0" stop-color="#ffd7a3"/><stop offset="50%" stop-color="#c1362f"/><stop offset="100%" stop-color="#5c0e12"/></radialGradient></defs>
</svg>`;
coinA.innerHTML = coinSVG;
coinB.innerHTML = coinSVG;

function buildSentence(subject, av, adj){
  let core, spokenAdjPart = adj.w;
  switch(av.type){
    case 'wrap_le': core = `${subject}太${adj.w}了`; break;
    case 'suffix_jile': core = `${subject}${adj.w}極了`; break;
    case 'wrap_de': core = `${subject}${av.ch}${adj.w}的`; break;
    default: core = `${subject}${av.t}${adj.w}`; break;
  }
  return core;
}

function scoreMatch(cat, adj){
  const cd = catDomain[cat];
  if(adj.domain==='universal') return 2.2;
  if(adj.domain===cd) return 3;
  if(cat==='人物' && adj.domain==='body') return 2.4;
  if(cat==='活動' && (adj.domain==='body'||adj.domain==='place')) return 1.5;
  if(cat==='身體' && adj.domain==='person') return 1.2;
  return 0.4;
}

function rollOutcome(score, forcesSheng){
  if(forcesSheng) return 'sheng';
  let table;
  if(score>=3) table=[.68,.27,.05];
  else if(score>=2) table=[.48,.36,.16];
  else if(score>=1) table=[.20,.45,.35];
  else table=[.06,.34,.60];
  const r = Math.random();
  if(r<table[0]) return 'sheng';
  if(r<table[0]+table[1]) return 'xiao';
  return 'yin';
}

const outcomeMeta = {
  sheng:{label:'聖\n杯', cls:'sheng', title:'聖杯', desc:'完美的句子，語法語意剛剛好！'},
  xiao:{label:'笑\n杯', cls:'xiao', title:'笑杯', desc:'超好笑、超幽默的句子——神明也被逗笑了！'},
  yin:{label:'陰\n杯', cls:'yin', title:'陰杯', desc:'嗯……這句話怪怪的，語意不太成立，再擲一次吧。'}
};

function speakSlow(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW';
  u.rate = 0.62;
  u.pitch = 1;
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v=>v.lang==='zh-TW') || voices.find(v=>v.lang && v.lang.startsWith('zh'));
  if(v) u.voice = v;
  window.speechSynthesis.speak(u);
}
let lastSpokenText = '';

function renderProgress(){
  progress.innerHTML = '';
  const total = 5;
  const label = document.createElement('span');
  label.textContent = `本輪擲筊 ${state.block}/${total}　`;
  progress.appendChild(label);
  for(let i=0;i<total;i++){
    const d = document.createElement('span');
    d.className='dot' + (i<state.block?' done':'');
    progress.appendChild(d);
  }
}
renderProgress();

btnToss.onclick=()=>{
  btnToss.disabled = true;
  coinA.classList.add('tossing','a');
  coinB.classList.add('tossing','b');
  sentenceBox.style.display='none';
  resultRow.style.display='none';
  controlsRow.style.display='none';

  setTimeout(()=>{
    coinA.classList.remove('tossing');
    coinB.classList.remove('tossing');

    // 選形容詞
    let pool = adjectives;
    if(state.adverbToken.neg) pool = adjectives.filter(a=>a.neg);
    const adj = drawFromPool(pool.map(a=>a.w), state.usedAdj);
    const adjObj = adjectives.find(a=>a.w===adj);

    const sentence = buildSentence(state.subject, state.adverbToken, adjObj);

    // 擲筊結果
    const score = scoreMatch(state.category, adjObj);
    state.block++;
    const mustSheng = (state.block>=5 && state.blockSheng===0);
    const outcome = rollOutcome(score, mustSheng);
    if(outcome==='sheng') state.blockSheng++;
    if(state.block>=5){ state.block=0; state.blockSheng=0; }

    // 顯示句子
    sentenceText.innerHTML = sentence.replace(adjObj.w, `<span class="hl">${adjObj.w}</span>`);
    let annot = '';
    if(adjObj.py) annot = `本句形容詞：${adjObj.w}　${adjObj.py}（${adjObj.jp}）`;
    annotText.textContent = annot;
    sentenceBox.style.display='block';

    lastSpokenText = sentence;
    speakSlow(sentence);

    // 顯示結果（延遲讓念白先進行）
    setTimeout(()=>{
      const meta = outcomeMeta[outcome];
      resultRow.innerHTML = `
        <div class="stamp ${meta.cls}">${meta.title}</div>
        <div class="result-comment"><b>${meta.title}</b><br>${meta.desc}</div>
      `;
      resultRow.style.display='flex';
      controlsRow.style.display='flex';
      renderProgress();

      state.history.unshift({s:sentence, r:meta.cls, label:meta.title});
      historyBox.style.display='block';
      historyList.innerHTML = state.history.slice(0,8).map(h=>
        `<div class="history-item"><span class="hs">${h.s}</span><span class="hr ${h.r}">${h.label}</span></div>`
      ).join('');

      btnToss.disabled = false;
    }, 700);

  }, 1150);
};

btnSpeak.onclick=()=>{ if(lastSpokenText) speakSlow(lastSpokenText); };

btnAgain.onclick=()=>{
  state.category=null; state.subject=null; state.adverbToken=null;
  pickedSubject.innerHTML=''; pickedLevel.innerHTML='';
  step2.classList.add('locked'); step3.classList.add('locked');
  sentenceBox.style.display='none'; resultRow.style.display='none'; controlsRow.style.display='none';
};

function resetStep3UIForNewSubject(){
  step3.classList.add('locked');
  pickedLevel.innerHTML='';
  sentenceBox.style.display='none';
  resultRow.style.display='none';
  controlsRow.style.display='none';
}

// preload voices for speechSynthesis
if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged = ()=>{ window.speechSynthesis.getVoices(); };
}
